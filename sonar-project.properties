sonar.projectKey=Keepnet
sonar.projectName=KeepnetLabs.UI
sonar.host.url=http://localhost:9000

sonar.sources=src
sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,**/public/**,**/*.spec.js,**/*.spec.ts,**/tests/**

sonar.tests=tests
sonar.test.inclusions=**/*.spec.js,**/*.spec.ts

sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Ignore false positive: Vue components already handle keyboard events internally
sonar.issue.ignore.multicriteria=e1,e2,e3,e4,e5
sonar.issue.ignore.multicriteria.e1.ruleKey=Web:MouseEventWithoutKeyboardEquivalentCheck
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*.vue

# Layout tables in email templates don't require <th> headers
sonar.issue.ignore.multicriteria.e2.ruleKey=Web:S5256
sonar.issue.ignore.multicriteria.e2.resourceKey=**/EmailTemplates/**

# Label association is handled at component usage site
sonar.issue.ignore.multicriteria.e3.ruleKey=Web:S6853
sonar.issue.ignore.multicriteria.e3.resourceKey=**/*

# Color contrast is design-driven and managed by the design system
sonar.issue.ignore.multicriteria.e4.ruleKey=css:S7924
sonar.issue.ignore.multicriteria.e4.resourceKey=**/*

# !important in text spacing is required by design system overrides
sonar.issue.ignore.multicriteria.e5.ruleKey=css:S7925
sonar.issue.ignore.multicriteria.e5.resourceKey=**/*
